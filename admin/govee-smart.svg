<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00C9FF"/>
      <stop offset="50%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#FF6584"/>
    </linearGradient>
    <radialGradient id="hubGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#1a1a2e"/>
  <!-- Soft outer glow -->
  <circle cx="128" cy="128" r="100" fill="url(#hubGlow)"/>
  <!-- Connecting strokes from hub to satellites -->
  <g stroke="url(#grad)" stroke-width="3" stroke-linecap="round" opacity="0.55" fill="none">
    <line x1="128" y1="128" x2="128" y2="56"/>
    <line x1="128" y1="128" x2="60" y2="92"/>
    <line x1="128" y1="128" x2="196" y2="92"/>
    <line x1="128" y1="128" x2="74" y2="186"/>
    <line x1="128" y1="128" x2="182" y2="186"/>
  </g>
  <!-- Satellite nodes -->
  <g fill="url(#grad)">
    <circle cx="128" cy="56" r="14"/>
    <circle cx="60" cy="92" r="12"/>
    <circle cx="196" cy="92" r="12"/>
    <circle cx="74" cy="186" r="12"/>
    <circle cx="182" cy="186" r="12"/>
  </g>
  <!-- Central hub: ring -->
  <circle cx="128" cy="128" r="26" fill="url(#grad)"/>
  <circle cx="128" cy="128" r="13" fill="#1a1a2e"/>
  <circle cx="128" cy="128" r="6" fill="url(#grad)"/>
</svg>
